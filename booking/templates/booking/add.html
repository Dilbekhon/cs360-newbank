{% extends 'home/base.html' %}

{% load static %}

{% block content %}

<div class="container">
  <h1>Book a visit</h1>

  {% if error_message %}
    <div class="alert alert-danger" role="alert">
      {{ error_message }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <label for="reason">Reason:</label><br>
    <input
      type="text"
      id="reason"
      name="reason"
      placeholder="Reason"
      value="{{ reason|default:'' }}"
      required
    ><br><br>

    <label for="date">Date:</label><br>
    <input
      type="date"
      id="date"
      name="date"
      value="{{ date|default:'' }}"
      required
    >

    <label for="time">Time:</label><br>
    <input
      type="time"
      id="time"
      name="time"
      value="{{ time|default:'' }}"
      required
    ><br><br>

    <button type="submit" class="btn btn-outline-primary">
      Submit
    </button>
  </form>
</div>

{% endblock %}
